    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      for (const dlnSt of drawLineStList) {
        const partPs = unitPsInfo.partPsList[dlnSt.partI]

        for (const ln of dlnSt.list) {
          const startLyr = partPs.lyrPsList[ln.startI]
          const endLyr = partPs.lyrPsList[ln.endI]

          const partX = unitPsInfo.x + partPs.x
          let partY = unitPsInfo.y + partPs.y
          partY *= -1

          const sx = partX + startLyr.x + drawStartX
          const sy = partY + startLyr.y * -1 + drawStartY
          const ex = partX + endLyr.x + drawStartX
          const ey = partY + endLyr.y * -1 + drawStartY

          ctx.beginPath()
          ctx.strokeStyle = partPs.color
          ctx.moveTo(sx, sy)
          ctx.lineTo(ex, ey)
          ctx.stroke()
        }
      }

      for (const partPs of unitPsInfo.partPsList) {

          const lyrY = lyrPs.y * -1 + partY + drawStartY

          ctx.beginPath()
          ctx.fillStyle = 'white'
          ctx.fillRect(lyrX - lyrPs.w * 0.5, lyrY - lyrPs.h * 0.5, lyrPs.w, lyrPs.h)

          ctx.beginPath()
          ctx.strokeStyle = partPs.color
          ctx.strokeRect(lyrX - lyrPs.w * 0.5, lyrY - lyrPs.h * 0.5, lyrPs.w, lyrPs.h)

          ctx.fillStyle = partPs.color
          ctx.font = '16px serif'
          ctx.fillText(`${lyrI}`, lyrX, lyrY)

          lyrI++
        }

        // if (isDrawGuide) {

    // usPsSt (unit-part-pos-st)
    function createPartPs(upPsSt, color, w, h) {
      const upPsStSp = upPsSt.split('/')
      const partCode = upPsStSp[0]
      const partPosSp = upPsStSp[1].split(',')
      const partX = Number(partPosSp[0])
      const partY = Number(partPosSp[1])
      upPsStSp.shift()
      upPsStSp.shift()

      const partPs = {
        code: partCode,
        x: partX,
        y: partY,
        originPos: {
          x: partX,
          y: partY
        },
        w: 0,
        h: 0,
        lyrPsList: [],
        color: color
      }

      let left = Number.MAX_SAFE_INTEGER
      let right = Number.MIN_SAFE_INTEGER
      let top = Number.MIN_SAFE_INTEGER
      let bottom = Number.MAX_SAFE_INTEGER

      for (const lyrPsSt of upPsStSp) {
        const lyrPsStSp = lyrPsSt.split(',')
        const lyrI = Number(lyrPsStSp[0])
        const lyrX = Number(lyrPsStSp[1])
        const lyrY = Number(lyrPsStSp[2])
        const lyrPs = {
          x: lyrX,
          y: lyrY,
          originPos: {
            x: lyrX,
            y: lyrY
          },
          w: w,
          h: h
        }
        partPs.lyrPsList.push(lyrPs)

        const hfw = w * 0.5
        const hfh = h * 0.5
        left = Math.min(left, lyrX - hfw)
        right = Math.max(right, lyrX + hfw)
        top = Math.max(top, lyrY + hfh)
        bottom = Math.min(bottom, lyrY - hfh)
      }

      const partW = Math.abs(right - left)
      const partH = Math.abs(top - bottom)

      partPs.w = partW
      partPs.h = partH

      return partPs
    }

    // 3d-pos

      const partI = Number(document.getElementById('id-input-edit-part-i').value)

      const spd = Number(document.getElementById('id-input-edit-spd').value)

      const lyrPs = partPs.lyrPsList[lyrI]

      const mx = dirX * spd
      const my = dirY * spd

      lyrPs.x += mx
      lyrPs.y += my

      draw()
    }

    function changePartI(dir) {
      let partI = Number(document.getElementById('id-input-edit-part-i').value)

      if (partI > lastI) partI = 0

      document.getElementById('id-input-edit-part-i').value = `${partI}`
    }

          if (mouseX >= left && mouseX <= right && mouseY >= top && mouseY <= bottom) {
            let frmLyrPs = null
            if (crntFrmInfo) frmLyrPs = crntFrmInfo.partList[partI].lyrPsList[i]

            moveLyrPs = {
              partX: partX,
              partY: partY,
              lyrPs: lyrPs,
              frmLyrPs: frmLyrPs
            }

            // document.getElementById('id-input-edit-part-i').value = `${partI}`
            // document.getElementById('id-input-edit-lyr-i').value = `${i}`

            isMouseDown = true
            canvas.onmousemove = mouseMove
            return
          }
        }

        partI++
      }
    }

    function mouseMove(e) {
      if (!isMouseDown) {
        isMouseDown = false
        canvas.onmousemove = null
        moveLyrPs = null
        return
      }

      mouseX = e.offsetX
      mouseY = e.offsetY

      if (moveLyrPs) {
        const lyrX = mouseX - moveLyrPs.partX - drawStartX
        const lyrY = mouseY - moveLyrPs.partY - drawStartY
        moveLyrPs.lyrPs.x = lyrX
        moveLyrPs.lyrPs.y = lyrY * -1

        if (moveLyrPs.frmLyrPs) {
          moveLyrPs.frmLyrPs.x = mouseX - drawStartX
          moveLyrPs.frmLyrPs.y = (mouseY - drawStartY) * -1
        }

        draw()
      }
    }

    function mouseLeave(e) {
      isMouseDown = false
      canvas.onmousemove = null
      moveLyrPs = null
    }

          console.log(`lyr-${i}: left: ${left}, right: ${right}, top: ${top}, bottom: ${bottom}`)
          // printLog(`lyr-${i}: left: ${left}, right: ${right}, top: ${top}, bottom: ${bottom}`)

          if (mouseX >= left && mouseX <= right && mouseY >= top && mouseY <= bottom) {
            let frmLyrPs = null
            if (crntFrmInfo) frmLyrPs = crntFrmInfo.partList[partI].lyrPsList[i]

            moveLyrPs = {
              partX: partX,

    function onClickMkCalcStgPosStBd() {
      const calcLineStList = []
      if (calcLineSt.length > 0) {
        const clcLineSp = calcLineSt.split('\n')
        for (const clcLn of clcLineSp) {
          const clcLnSp = clcLn.split('/')
          const partCode = clcLnSp[0]
          const info = {
            partCode: partCode,
            list: []
          }

          clcLnSp.shift()
          for (const ln of clcLnSp) {
            const lnSp = ln.split(',')
            const startI = Number(lnSp[0])
            const endI = Number(lnSp[1])
            info.list.push({
              startI: startI,
              endI: endI
            })
          }

          calcLineStList.push(info)
        }
      }

      const calcPartStcStList = []
      for (const partPs of unitPsInfo.partPsList) {
        let cpsSt = `${partPs.code}`
        const cpsLyrStList = []
        let lyrI = 0
        for (const lyrPs of partPs.lyrPsList) {
          let lyrX = partPs.x + lyrPs.x
          let lyrY = partPs.y + lyrPs.y
          cpsLyrStList.push(`${lyrI},${lyrX},${lyrY}`)
          lyrI++
        }
        cpsSt += `\n${cpsLyrStList.join('/')}`

        const lineInfo = calcLineStList.find(ln => ln.partCode === partPs.code)
        if (lineInfo) {
          const lnList = []
          for (const lnInfo of lineInfo.list) {
            let startLyr = null
            if (lnInfo.startI >= 0) {
              startLyr = partPs.lyrPsList[lnInfo.startI]
            } else {
              startLyr = {
                x: partPs.x * -1, y: partPs.y * -1
              }
            }
            const endLyr = partPs.lyrPsList[lnInfo.endI]
            const dx = (endLyr.x + partPs.x) - (startLyr.x + partPs.x)
            const dy = (endLyr.y + partPs.y) - (startLyr.y + partPs.y)
            const distance = Math.sqrt(Math.abs(dx * dx) + Math.abs(dy * dy))
            lnList.push(`${lnInfo.startI},${lnInfo.endI},${distance}`)
          }
          cpsSt += `\n${lnList.join('/')}`
        } else {
          const lrPs = partPs.lyrPsList[0]
          const dx = lrPs.x + partPs.x
          const dy = lrPs.y + partPs.y
          const distance = Math.sqrt(Math.abs(dx * dx) + Math.abs(dy * dy))
          cpsSt += `\n-1,0,${distance}`
        }

        calcPartStcStList.push(cpsSt)
      }

      document.getElementById('id-textarea-calc-stg-pos-st-bd').value = calcPartStcStList.join('\n===\n')
    }

    function mkCalcStgPosStBd() {
      const calcLineStList = []
      if (calcLineSt.length > 0) {
        const clcLineSp = calcLineSt.split('\n')
        for (const clcLn of clcLineSp) {
          const clcLnSp = clcLn.split('/')
          const partCode = clcLnSp[0]
          const info = {
            partCode: partCode,
            list: []
          }

          clcLnSp.shift()
          for (const ln of clcLnSp) {
            const lnSp = ln.split(',')
            const startI = Number(lnSp[0])
            const endI = Number(lnSp[1])
            info.list.push({
              startI: startI,
              endI: endI
            })
          }

          calcLineStList.push(info)
        }
      }

      const calcPartStcStList = []
      for (const partPs of unitPsInfo.partPsList) {
        let cpsSt = `${partPs.code}`
        const cpsLyrStList = []
        let lyrI = 0
        for (const lyrPs of partPs.lyrPsList) {
          let lyrX = partPs.x + lyrPs.x
          let lyrY = partPs.y + lyrPs.y
          cpsLyrStList.push(`${lyrI},${lyrX},${lyrY}`)
          lyrI++
        }
        cpsSt += `\n${cpsLyrStList.join('/')}`

        const lineInfo = calcLineStList.find(ln => ln.partCode === partPs.code)
        if (lineInfo) {
          const lnList = []
          for (const lnInfo of lineInfo.list) {
            let startLyr = null
            if (lnInfo.startI >= 0) {
              startLyr = partPs.lyrPsList[lnInfo.startI]
            } else {
              startLyr = {
                x: partPs.x * -1, y: partPs.y * -1
              }
            }
            const endLyr = partPs.lyrPsList[lnInfo.endI]
            const dx = (endLyr.x + partPs.x) - (startLyr.x + partPs.x)
            const dy = (endLyr.y + partPs.y) - (startLyr.y + partPs.y)
            const distance = Math.sqrt(Math.abs(dx * dx) + Math.abs(dy * dy))
            lnList.push(`${lnInfo.startI},${lnInfo.endI},${distance}`)
          }
          cpsSt += `\n${lnList.join('/')}`
        } else {
          const lrPs = partPs.lyrPsList[0]
          const dx = lrPs.x + partPs.x
          const dy = lrPs.y + partPs.y
          const distance = Math.sqrt(Math.abs(dx * dx) + Math.abs(dy * dy))
          cpsSt += `\n-1,0,${distance}`
        }

        calcPartStcStList.push(cpsSt)
      }

      const calcStgPosStBd = calcPartStcStList.join('\n===\n')

      return calcStgPosStBd
    }
